syntax = "proto3";

package v2ray.core.app.stats.command;

import "app/stats/config.proto";
import "common/serial/typed_message.proto";

option csharp_namespace = "V2Ray.Core.App.Stats.Command";
option go_package = "github.com/v2fly/v2ray-core/v4/app/stats/command";
option java_package = "com.v2ray.core.app.stats.command";
option java_multiple_files = true;

message GetStatsRequest {
  // Name of the stat counter.
  string name = 1;
  // Whether or not to reset the counter to zero after read.
  bool reset = 2;
}

message Stat {
  string name = 1;
  int64 value = 2;
}

message GetStatsResponse {
  Stat stat = 1;
}

message QueryStatsRequest {
  string pattern = 1;
  bool reset = 2;
}

message QueryStatsResponse {
  repeated Stat stat = 1;
}

message GetSysStatsRequest {
}

message SysStatsResponse {
  int64 NumGoroutine = 1;
  int64 NumGC = 2;
  int64 Alloc = 3;
  int64 TotalAlloc = 4;
  int64 Sys = 5;
  int64 Mallocs = 6;
  int64 Frees = 7;
  int64 LiveObjects = 8;
  int64 PauseTotalNs = 9;
  uint32 Uptime = 10;
}

service StatsService {
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
  }
  rpc QueryStats(QueryStatsRequest) returns (QueryStatsResponse) {
  }
  rpc GetSysStats(GetSysStatsRequest) returns (SysStatsResponse) {
  }
}

message Config {
};
